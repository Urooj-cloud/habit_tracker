<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Goals - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }
        .progress-bar { background: #334155; border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-fill { background: #38bdf8; height: 100%; width: 45%; }
    </style>
</head>
<body class="p-6">
    <header class="mb-8">
        <h1 class="text-3xl font-bold text-sky-400">Habit Tracker</h1>
        <p class="text-slate-400">Welcome back, Urooj</p>
    </header>

    <div class="card">
        <h2 class="text-xl font-semibold mb-2">Weekly Progress</h2>
        <div class="progress-bar mb-2"><div class="progress-fill"></div></div>
        <p class="text-sm text-slate-400">45% of your goals completed this week</p>
    </div>

    <div class="grid grid-cols-1 gap-4">
        <div class="card flex justify-between items-center">
            <span>Learn Human Psychology</span>
            <button class="bg-sky-600 px-4 py-1 rounded-lg">Done</button>
        </div>
        <div class="card flex justify-between items-center">
            <span>QA Automation Practice</span>
            <button class="bg-sky-600 px-4 py-1 rounded-lg">Done</button>
        </div>
        <div class="card flex justify-between items-center">
            <span>English Vocabulary</span>
            <button class="bg-sky-600 px-4 py-1 rounded-lg">Done</button>
        </div>
    </div>

    <footer class="mt-8 text-center text-slate-500 text-sm">
        Built with Grit & Code
    </footer>
</body>
</html>
